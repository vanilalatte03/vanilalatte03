name: commitchi tick

on:
  schedule:
    # every 6 hours
    - cron: "0 */6 * * *"
  # Run manually the first time from the Actions tab to seed pet.svg.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  # Shared with visitor.yml: both write pet.svg / pet-state.json, so they must not run concurrently.
  group: commitchi-pet-state
  cancel-in-progress: false
  queue: max

jobs:
  tick:
    if: github.repository != 'vanilalatte03/commitchi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - name: Sync latest pet state
        run: git pull --rebase origin "${{ github.event.repository.default_branch }}"

      - name: Tick the pet
        run: node dist/index.js
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          # GITHUB_TOKEN covers public contributions. For private contribution
          # counts, create a PAT with read:user and store it as secret PET_TOKEN.
          GH_TOKEN: ${{ secrets.PET_TOKEN || github.token }}

      - name: Commit the pet
        run: |
          git config user.name "commitchi-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pet.svg
          git add -f pet-state.json
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "chore: tick the pet 🐣"
            git push
          fi
