name: commitchi visitor interaction

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  # Shared with tick.yml: both write pet.svg / pet-state.json, so they must not run concurrently.
  group: commitchi-pet-state
  cancel-in-progress: false
  queue: max

jobs:
  interact:
    if: github.repository != 'vanilalatte03/commitchi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - name: Sync latest pet state
        run: git pull --rebase origin "${{ github.event.repository.default_branch }}"

      - name: Apply visitor action
        id: visitor
        run: npm run visitor
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}

      - name: Commit the pet
        if: steps.visitor.outputs.changed == 'true'
        run: |
          git config user.name "commitchi-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pet.svg
          git add -f pet-state.json
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "chore: apply visitor interaction"
            git push
          fi

      - name: Comment on interaction issue
        if: steps.visitor.outputs.recognized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const result = JSON.parse(fs.readFileSync("interaction-result.json", "utf8"));
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: result.comment,
            });

      - name: Close interaction issue
        if: steps.visitor.outputs.recognized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });
